<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CineBooking | Movie Ticket System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E50914; --bg: #141414; --surface: #1F1F1F; --text: #FFFFFF; --muted: #B3B3B3; --border: #333333; --green: #46D369; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        @media print {
            body { background: white !important; }
            * { color: black !important; background-color: transparent !important; }
            nav, .container, #toast, #confirm-modal { display: none !important; }
            #printable-receipt { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
            .receipt-card { box-shadow: none !important; border: 2px solid #000 !important; margin: 20px auto; width: 500px !important; padding: 40px !important; border-radius: 0 !important; }
            .btn-outline, .btn-danger, .btn-primary { display: none !important; }
        }

        .nav { height: 70px; background: #000000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 60px; position: sticky; top: 0; z-index: 1000; }
        .nav-logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 32px; height: 100%; }
        .nav-item { font-size: 0.95rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; display: flex; align-items: center; padding: 0 10px; transition: color 0.2s; }
        .nav-item.active { color: var(--text); border-bottom-color: var(--primary); }
        .container { max-width: 1100px; margin: 0 auto; padding: 48px 60px; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .movie-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .movie-card h3 { font-size: 1.4rem; margin-bottom: 8px; font-weight: 800; }
        .movie-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 16px; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; color: white; border: 1px solid var(--border); }
        .btn-danger { background: #E50914; color: white; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: var(--muted); }
        input, select { width: 100%; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; color: white; outline: none; }
        .box { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 32px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px; font-size: 0.95rem; border-bottom: 1px solid var(--border); }
        .screen { height: 40px; background: linear-gradient(to bottom, #555, transparent); margin: 0 auto 30px; border-top-left-radius: 50%; border-top-right-radius: 50%; text-align: center; color: var(--muted); font-size: 0.8rem; line-height: 20px; font-weight: 800; }
        .seats-container { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 30px; }
        .seat-row { display: flex; gap: 10px; }
        .seat { width: 35px; height: 35px; background: #333; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; position: relative; }
        .seat:hover::after { content: attr(data-label); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; white-space: nowrap; pointer-events: none; z-index: 10; }
        .seat.selected { background: var(--green); }
        .seat.booked { background: var(--primary); cursor: not-allowed; opacity: 0.7; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; color: var(--muted); font-size: 0.85rem; }
        .legend div { display: flex; align-items: center; gap: 8px; }
        .legend .box-icon { width: 16px; height: 16px; border-radius: 4px; }
        
        .receipt-card { background: white !important; color: black !important; padding: 40px; border-radius: 12px; margin: 0 auto; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .receipt-card * { color: black !important; border-color: #ccc !important; }
        .receipt-header { text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 20px; margin-bottom: 20px; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1rem; }
        
        #toast { visibility: hidden; min-width: 300px; background-color: #FFFFFF; color: #141414; text-align: center; border-radius: 12px; padding: 20px; position: fixed; z-index: 2000; right: 30px; bottom: 30px; font-size: 1rem; font-weight: 700; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-bottom: 5px solid var(--primary); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        
        #confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-inner { background: var(--surface); padding: 50px; border-radius: 20px; text-align: center; border: 1px solid var(--border); max-width: 500px; width: 90%; }
        .id-badge { background: var(--green); color: black; font-size: 2.5rem; font-weight: 800; padding: 10px 30px; border-radius: 10px; display: inline-block; margin: 20px 0; }
        #output { display: none; }
        #printable-receipt { display: none; }
    </style>
</head>
<body>
    <div id="output"></div>
    <div id="printable-receipt"></div>

    <nav class="nav no-print">
        <div class="nav-logo">Cine<span>Booking</span></div>
        <div class="nav-links">
            <div class="nav-item active" onclick="switchTab('movies')">Now Showing</div>
            <div class="nav-item" onclick="switchTab('book')">Book Tickets</div>
            <div class="nav-item" onclick="switchTab('receipt')">View/Cancel</div>
            <div class="nav-item" onclick="switchTab('occupancy')">Occupancy</div>
        </div>
    </nav>

    <div class="container no-print">
        <div id="movies" class="tab-content active"><div class="header"><h1>Now Showing</h1></div><div class="card-grid" id="movieGrid"></div></div>
        <div id="book" class="tab-content">
            <div class="header"><h1>Book Tickets</h1></div>
            <div style="display: flex; gap: 40px;">
                <div class="box" style="flex: 1;">
                    <div class="form-group"><label>Select Movie</label><select id="bMovie" onchange="fetchSeats()"></select></div>
                    <div class="form-group"><label>Customer Name</label><input type="text" id="bName" placeholder="Enter name"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="processBooking()">Confirm Booking</button>
                </div>
                <div class="box" style="flex: 2;"><div class="screen">Screen</div><div class="legend"><div><div class="box-icon" style="background: #333"></div> Available</div><div><div class="box-icon" style="background: var(--primary)"></div> Booked</div><div><div class="box-icon" style="background: var(--green)"></div> Selected</div></div><div class="seats-container" id="seatGrid"></div></div>
            </div>
        </div>
        <div id="receipt" class="tab-content">
            <div class="header"><h1>Manage Booking</h1></div>
            <div class="box" style="max-width: 500px; margin: 0 auto; text-align: center;">
                <div class="form-group"><input type="number" id="vBookingId" placeholder="Enter Booking ID"></div>
                <button class="btn btn-primary" style="width:100%" onclick="fetchReceipt()">Search Booking</button>
            </div>
            <div id="receiptArea" style="margin-top: 40px; display: none;"></div>
        </div>
        <div id="occupancy" class="tab-content">
            <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Occupancy Report</h1>
                <button class="btn btn-outline" onclick="syncFromCloud()">🔄 Sync from Terminal (Cloud)</button>
            </div>
            <div class="box"><table><thead><tr><th>ID</th><th>Movie</th><th>Timing</th><th>Booked</th><th>Occupancy</th></tr></thead><tbody id="occBody"></tbody></table></div>
        </div>
    </div>

    <div id="confirm-modal">
        <div class="modal-inner">
            <h1 style="color: var(--green)">Booking Confirmed!</h1>
            <p style="color: var(--muted); margin-top: 10px;">Your Ticket ID is:</p>
            <div class="id-badge" id="resId">1001</div>
            <p style="margin-bottom: 30px;">Keep this ID to view or cancel your ticket.</p>
            <button class="btn btn-primary" onclick="closeModal()">Great!</button>
        </div>
    </div>
    <div id="toast">Message</div>

    <script type='text/javascript'>
        let shows = [], currentSeats = [], selectedSeats = [];
        function showToast(m, s=false) { const t=document.getElementById("toast"); t.innerText=m; t.style.borderBottomColor=s?"var(--green)":"var(--primary)"; t.className="show"; setTimeout(()=>t.className="", 3000); }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; switchTab('movies'); }
        function switchTab(tabId) { document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active')); document.getElementById(tabId).classList.add('active'); if(tabId === 'movies') refreshShows(); if(tabId === 'book') populateBookDropdown(); if(tabId === 'occupancy') refreshOccupancy(); }
        
        function parse(t) {
            if (t.startsWith("SHOW|")) { const p=t.split("|"); shows.push({id:p[1], name:p[2], timing:p[3], price:p[4]}); }
            else if (t.startsWith("SEAT|")) { const p=t.split("|"); currentSeats.push({r:parseInt(p[1]), c:parseInt(p[2]), s:parseInt(p[3])}); }
            else if (t.startsWith("SEAT_DONE|")) { renderSeatGrid(); }
            else if (t.startsWith("MSG|")) { 
                const m = t.replace("MSG|", ""); 
                showToast(m, m.includes("Success")); 
                if(m.includes("cancelled")) { setTimeout(() => { document.getElementById('receiptArea').style.display = 'none'; refreshOccupancy(); }, 10); }
            }
            else if (t.startsWith("SUCCESS_BOOKING|")) { const p=t.split("|"); document.getElementById('resId').innerText = p[1]; document.getElementById('confirm-modal').style.display = 'flex'; selectedSeats = []; }
            else if (t.startsWith("RECEIPT|")) {
                const p=t.split("|");
                const cardHtml = `<div class="receipt-card"><div class="receipt-header"><h2>CINEBOOKING</h2><p>Official Ticket</p></div><div class="receipt-row"><span>ID:</span><b>#${p[1]}</b></div><div class="receipt-row"><span>Name:</span><b>${p[2]}</b></div><div class="receipt-row"><span>Movie:</span><b>${p[3]}</b></div><div class="receipt-row"><span>Time:</span><b>${p[4]}</b></div><div class="receipt-row"><span>Seats:</span><b>${p[7]}</b></div><div class="receipt-row" style="margin-top:20px; font-size:1.2rem"><span>Total:</span><b>₹${p[6]}</b></div><div style="display:flex; gap:10px; margin-top:20px;" class="no-print"><button class="btn btn-outline" style="flex:1" onclick="window.print()">Print/Save PDF</button><button class="btn btn-danger" style="flex:1" onclick="cancelBooking(${p[1]})">Cancel Booking</button></div></div>`;
                document.getElementById('receiptArea').innerHTML = cardHtml;
                document.getElementById('receiptArea').style.display = 'block';
                document.getElementById('printable-receipt').innerHTML = cardHtml;
            }
            else if (t.startsWith("REPORT|")) { const p=t.split("|"); document.getElementById('occBody').innerHTML += `<tr><td>#${p[1]}</td><td>${p[2]}</td><td>${p[3]}</td><td>${p[5]}/${p[4]}</td><td style="color:${p[7]>75?'var(--primary)':'var(--green)'}">${parseFloat(p[7]).toFixed(1)}%</td></tr>`; }
        }

        var Module = {
            print: (t) => parse(t),
            preRun: [function() { try { FS.mkdir('/data'); FS.mount(IDBFS, {}, '/data'); } catch(e){} }],
            onRuntimeInitialized: function() { 
                FS.syncfs(true, function (err) { 
                    if (err) { 
                        console.error("IDBFS mount error:", err); 
                        showToast("Error: Local database sync failed!"); 
                    } else {
                        Module.ccall('loadData', null, [], []); 
                        refreshShows(); 
                        showToast("System Ready", true);
                    }
                }); 
            }
        };

        function refreshShows() { shows=[]; Module.ccall('getShows', null, [], []); setTimeout(()=>{ const g=document.getElementById('movieGrid'); if(!g) return; g.innerHTML=""; shows.forEach(s=>{ g.innerHTML+=`<div class="movie-card"><h3>${s.name}</h3><p>${s.timing}</p><div style="display:flex; justify-content:space-between; align-items:center"><b>₹${s.price}</b><button class="btn btn-primary" onclick="bookFromMovieTab(${s.id})">Book</button></div></div>`; }); }, 100); }
        function bookFromMovieTab(id) { switchTab('book'); setTimeout(()=>{ document.getElementById('bMovie').value=id; fetchSeats(); }, 50); }
        function populateBookDropdown() { const sel=document.getElementById('bMovie'); if(!sel) return; sel.innerHTML="<option value=''>-- Movie --</option>"; shows.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`); }
        function fetchSeats() { const id=document.getElementById('bMovie').value; if(!id) return; currentSeats=[]; selectedSeats=[]; Module.ccall('getSeatLayout', null, ['number'], [parseInt(id)]); }
        function renderSeatGrid() { 
            const g=document.getElementById('seatGrid'); if(!g) return; let h=""; 
            for(let r=0; r<5; r++) { 
                h+=`<div class="seat-row">`; 
                for(let c=0; c<10; c++) { 
                    const s=currentSeats.find(x=>x.r===r && x.c===c); 
                    const label = `R${r+1} C${c+1}`;
                    if(s && s.s===1) h+=`<div class="seat booked" data-label="${label}">X</div>`; 
                    else h+=`<div class="seat" data-label="${label}" onclick="toggleSeat(${r}, ${c}, this)"></div>`; 
                } 
                h+=`</div>`; 
            } 
            g.innerHTML=h; 
        }
        function toggleSeat(r, c, el) { const i=selectedSeats.findIndex(s=>s.r===r && s.c===c); if(i>-1) { selectedSeats.splice(i, 1); el.classList.remove('selected'); } else { if(selectedSeats.length>=20) return; selectedSeats.push({r, c}); el.classList.add('selected'); } }
        function processBooking() { const id=document.getElementById('bMovie').value, n=document.getElementById('bName').value.trim(); if(!id || !n || selectedSeats.length===0) return showToast("Missing info!"); Module.ccall('bookTickets', null, ['number', 'string', 'number', 'string'], [parseInt(id), n, selectedSeats.length, selectedSeats.map(s=>`${s.r},${s.c}`).join('-')]); }
        function fetchReceipt() { const id=document.getElementById('vBookingId').value; if(id) Module.ccall('viewBooking', null, ['number'], [parseInt(id)]); }
        function cancelBooking(id) { if(confirm("Are you sure you want to cancel this booking?")) { setTimeout(() => { Module.ccall('cancelBooking', null, ['number'], [id]); }, 10); } }
        function refreshOccupancy() { const b=document.getElementById('occBody'); if(b) b.innerHTML=""; Module.ccall('getOccupancyReport', null, [], []); }

        async function syncFromCloud() {
            if(!confirm("This will overwrite your browser's data with the latest files from your Terminal (GitHub). Proceed?")) return;
            showToast("Syncing from Cloud...");
            try {
                // Fetch latest files from origin with cache-busting
                const res1 = await fetch('shows.dat?nocache=' + new Date().getTime());
                const res2 = await fetch('bookings.dat?nocache=' + new Date().getTime());
                if(!res1.ok || !res2.ok) throw new Error("Could not fetch data from server.");
                
                const data1 = new Uint8Array(await res1.arrayBuffer());
                const data2 = new Uint8Array(await res2.arrayBuffer());

                // Write to Emscripten data folder
                FS.writeFile('/data/shows.dat', data1);
                FS.writeFile('/data/bookings.dat', data2);
                
                // Persist back to IDBFS
                FS.syncfs(false, function (err) {
                    if (err) {
                        showToast("Browser sync failed!");
                        console.error(err);
                    } else {
                        showToast("Sync Successful! Reloading...", true);
                        setTimeout(() => location.reload(), 1500);
                    }
                });
            } catch(e) {
                console.error(e);
                showToast("Sync Failed: " + e.message);
            }
        }
    </script>
    <script async src="index.js"></script>
</body>
</html>
